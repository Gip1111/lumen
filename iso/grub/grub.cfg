# Minimal GRUB configuration for Lumen
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

set timeout=5
set default=0

menuentry "Lumen Live Desktop (x86_64)" {
    set gfxpayload=keep
    search --no-floppy --set=root --label LUMEN_ALPHA
    linux /lumen/boot/x86_64/vmlinuz-linux archisobasedir=lumen archisolabel=LUMEN_ALPHA
    initrd /lumen/boot/x86_64/initramfs-linux.img
}

menuentry "Run Memtest86+" {
    set gfxpayload=keep
    linux /lumen/boot/memtest86+/memtest.efi
}
