---
modules-search: [ local ]

instances:
- id:       lumen
  module:   branding
  config:   branding.desc

sequence:
- show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
- exec:
    - partition
    - mount
    - unpackfs
    - networkcfg
    - hwclock
    - services-systemd
    - users
    - displaymanager
    - grubcfg
    - bootloader
    - postcfg
    - umount
- show:
    - finished

brand-id: lumen
provisioning-check: false
